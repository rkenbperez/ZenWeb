{% load static %}

    <title>{% block title %} ZenSMP {% endblock %}</title>

    <link rel="icon" type="image/svg+xml" href="{% static 'images/favicon.svg' %}" />

<!-- Smooth Scrolling CSS -->
<style>
  html {
    scroll-behavior: smooth;
  }
  
  /* Active nav link styling */
  .menu a.active {
    color: var(--primary);
    font-weight: 600;
  }
</style>

<!-- Active Link Detection Script -->
<script>
// Highlight active nav link based on scroll position
document.addEventListener('DOMContentLoaded', function() {
  const sections = ['home', 'features', 'gallery', 'rules', 'store'];
  const navLinks = document.querySelectorAll('.menu a[href^="#"]');
  
  window.addEventListener('scroll', function() {
    let current = '';
    sections.forEach(section => {
      const element = document.getElementById(section);
      if (element) {
        const rect = element.getBoundingClientRect();
        if (rect.top <= 100) {
          current = section;
        }
      }
    });
    
    navLinks.forEach(link => {
      link.classList.remove('active');
      if (link.getAttribute('href') === '#' + current) {
        link.classList.add('active');
      }
    });
  });
});
</script>

<script>
// Canvas Particle System
document.addEventListener('DOMContentLoaded', function() {
  const canvas = document.getElementById('particleCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let mouseX = 0;
  let mouseY = 0;

  // Resize canvas
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // Mouse tracking
  window.addEventListener('mousemove', function(e) {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  // Particle class
  class Particle {
    constructor() {
      this.reset();
    }

    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 4 + 1;
      this.speedX = (Math.random() - 0.5) * 0.5;
      this.speedY = (Math.random() - 0.5) * 0.5;
      this.opacity = Math.random() * 0.3 + 0.1;
      this.color = this.randomColor();
    }

    randomColor() {
      const colors = [
        'rgba(99, 102, 241, ',
        'rgba(236, 72, 153, ',
        'rgba(52, 211, 153, ',
        'rgba(251, 191, 36, ',
        'rgba(139, 92, 246, '
      ];
      return colors[Math.floor(Math.random() * colors.length)];
    }

    update() {
      // Mouse interaction
      const dx = mouseX - this.x;
      const dy = mouseY - this.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      if (distance < 150) {
        const force = (150 - distance) / 150;
        this.speedX += (dx / distance) * force * 0.02;
        this.speedY += (dy / distance) * force * 0.02;
      }

      this.x += this.speedX;
      this.y += this.speedY;

      // Random movement
      this.speedX += (Math.random() - 0.5) * 0.02;
      this.speedY += (Math.random() - 0.5) * 0.02;

      // Speed limit
      const maxSpeed = 0.8;
      const currentSpeed = Math.sqrt(this.speedX * this.speedX + this.speedY * this.speedY);
      if (currentSpeed > maxSpeed) {
        this.speedX = (this.speedX / currentSpeed) * maxSpeed;
        this.speedY = (this.speedY / currentSpeed) * maxSpeed;
      }

      // Wrap around screen
      if (this.x < -10) this.x = canvas.width + 10;
      if (this.x > canvas.width + 10) this.x = -10;
      if (this.y < -10) this.y = canvas.height + 10;
      if (this.y > canvas.height + 10) this.y = -10;
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color + this.opacity + ')';
      ctx.fill();

      // Glow effect
      if (this.size > 2) {
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color + '0.2)';
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }
  }

  // Create particles
  function initParticles() {
    particles = [];
    const count = Math.min(80, Math.floor(window.innerWidth / 10));
    for (let i = 0; i < count; i++) {
      particles.push(new Particle());
    }
  }
  initParticles();

  // Connect particles with lines
  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < 150) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(99, 102, 241, ${0.08 * (1 - distance / 150)})`;
          ctx.lineWidth = 0.5;
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  // Animation loop
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Update and draw particles
    particles.forEach(particle => {
      particle.update();
      particle.draw();
    });
    
    drawConnections();
    requestAnimationFrame(animate);
  }

  animate();

  // Handle window resize
  window.addEventListener('resize', function() {
    resizeCanvas();
    initParticles();
  });
});
</script>

</body>
</html>
