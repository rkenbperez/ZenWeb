{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="hero bg-base-200 min-h-[70vh]">
  <div class="hero-content text-center">
    <div class="max-w-2xl">
      <h1 class="text-4xl font-bold">THE ULTIMATE SURVIVAL</h1>
      <h1 class="text-4xl font-bold">EXPERIENCE</h1>
      <p class="p-5">
       Join a thriving community of builders and adventurers. No griefing, custom economy, and massive world borders.
      </p>
      
      <!-- IP Copy Box -->
      <div class="flex items-center justify-between gap-2 max-w-[200px] mx-auto mt-2 bg-base-100 rounded-lg px-2 py-1 border border-base-300">
        <span class="font-mono text-[10px] truncate">play.zensmp.space</span>
        <button onclick="copyIP()" class="btn btn-primary btn-xs gap-0.5 px-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-2.5 w-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
          </svg>
          Copy
        </button>
      </div>

      <!-- Server Status - JavaScript Method -->
      <div class="flex justify-center mt-2" id="server-status-container">
        <span class="badge badge-ghost gap-1.5 px-3 py-2">
          <span class="inline-block w-1.5 h-1.5 bg-gray-400 rounded-full animate-pulse"></span>
          Loading...
        </span>
      </div>

    </div>
  </div>
</div>

<script>
function copyIP() {
  const ip = 'play.zensmp.space';
  navigator.clipboard.writeText(ip).then(() => {
    const btn = event.target.closest('button');
    const originalText = btn.innerHTML;
    btn.innerHTML = `
      <svg xmlns="http://www.w3.org/2000/svg" class="h-2.5 w-2.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
      Copied!
    `;
    btn.classList.remove('btn-primary');
    btn.classList.add('btn-success');
    setTimeout(() => {
      btn.innerHTML = originalText;
      btn.classList.remove('btn-success');
      btn.classList.add('btn-primary');
    }, 2000);
  });
}

// Fetch server status from API
fetch('https://api.mcsrvstat.us/3/december-warehouse.gl.joinmc.link')
    .then(response => response.json())
    .then(data => {
        const container = document.getElementById('server-status-container');
        if (data.online) {
            container.innerHTML = `
                <span class="badge badge-success gap-1.5 px-3 py-2">
                    <span class="inline-block w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
                    ${data.players.online}/${data.players.max} Online
                </span>
            `;
        } else {
            container.innerHTML = `
                <span class="badge badge-error gap-1.5 px-3 py-2">
                    <span class="inline-block w-1.5 h-1.5 bg-red-500 rounded-full"></span>
                    Server Offline
                </span>
            `;
        }
    })
    .catch(() => {
        const container = document.getElementById('server-status-container');
        container.innerHTML = `
            <span class="badge badge-warning gap-1.5 px-3 py-2">
                <span class="inline-block w-1.5 h-1.5 bg-yellow-500 rounded-full"></span>
                Status Unavailable
            </span>
        `;
    });
</script>

{% endblock %}
