{% load static %}
<!DOCTYPE html>
<html data-theme="corporate" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} ZenWeb {% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
</head>
<body>

<!-- Fixed Navbar with proper styling -->
<div class="navbar bg-base-100 shadow-sm fixed w-full z-20 top-0 start-0 border-b border-base-200">
  <div class="navbar-start">
    <div class="dropdown">
      <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" />
        </svg>
      </div>
      <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
        <li><a>Home</a></li>
        <li><a>Features</a></li>
        <li><a>Gallery</a></li>
        <li><a>Rules</a></li>
        <li><a>Store</a></li>
      </ul>
    </div>
    <a href="{% url 'home' %}" class="flex items-center gap-2">
      <img src="{% static 'images/Logo.png' %}" class="h-12 w-auto" alt="ZenWeb Logo" />
      <span class="text-xl font-bold">ZenSMP</span>
    </a>
  </div>
  
  <div class="navbar-center hidden lg:flex">
    <ul class="menu menu-horizontal px-1">
      <li><a>Home</a></li>
      <li><a>Features</a></li>
      <li><a>Gallery</a></li>
      <li><a>Rules</a></li>
      <li><a>Store</a></li>
    </ul>
  </div>
  
  <div class="navbar-end">
    <a class="btn btn-primary btn-sm">Join Server</a>
  </div>
</div>

<!-- Main content block - added margin-top to account for fixed navbar -->
<div class="container mx-auto mt-20 px-4">
    {% block content %}
    <!-- Default content goes here -->
    {% endblock %}
</div>

</body>
</html>
