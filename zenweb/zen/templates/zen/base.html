{% load static %}
<!DOCTYPE html>
<html data-theme="corporate" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} ZenWeb {% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
</head>
<body>

<!-- Navigation with ZenWeb Branding - NO BORDER -->
<div data-theme="sunset" class="navbar bg-base-100 shadow-sm fixed w-full z-20 top-0 start-0 py-0 min-h-[50px]">
  <div class="navbar-start">
    <div class="dropdown">
      <div tabindex="0" role="button" class="btn btn-ghost btn-circle btn-xs">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </div>
      <ul tabindex="0" class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-2 w-52 p-2 shadow">
        <li><a href="{% url 'home' %}">Home</a></li>
        <li><a href="#">About</a></li>
      </ul>
    </div>
  </div>
  
  <div class="navbar-center">
    <a href="{% url 'home' %}" class="flex items-center">
      <img src="{% static 'images/Logo.png' %}" class="h-20 w-auto" alt="ZenWeb Logo" />
    </a>
  </div>
  
  <div class="navbar-end">
  </div>
</div>

<!-- Main content block -->
{% block content %}
<!-- Default content goes here -->
{% endblock %}

</body>
</html>
